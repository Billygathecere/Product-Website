    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <link rel="stylesheet" href="mycart.css">
</head>

<body>
    <header>
        <h1>🛒 Your Cart</h1>
        <p class="tagline">Review your selected juices</p>
    </header>
    <main>
        <div class="cart-container">
            <div id="cart-items" class="cart-items">
                <!-- Cart items will be dynamically added here -->
                 <p class="empty-cart-msg">Your cart is currently empty. <a href="product.html">Start shopping!</a></p>
            </div>
            
            <div class="cart-summary">
                <h2>Summary</h2>
                <div class="summary-item">
                    <span>Total:</span>
                    <span id="cart-total" class="total-price">$0.00</span>
                </div>
                <button id="checkout-btn" class="btn-checkout">Proceed to Checkout</button>
                <a href="product.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Products</a>
            </div>
        </div>
    </main>
</body>

</html>
